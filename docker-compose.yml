services:
  nginx:
    image: nginx:alpine
    container_name: sinny_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src/public:/var/www/html/public
      - ./src/app:/var/www/html/app
      - ./src/config:/var/www/html/config
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - sinny_network

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: sinny_php
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mysql
    networks:
      - sinny_network

  mysql:
    image: mysql:8.0
    container_name: sinny_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: tommysinny
      MYSQL_USER: sinny_user
      MYSQL_PASSWORD: sinny_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - sinny_network

volumes:
  mysql_data:

networks:
  sinny_network:
    driver: bridge
