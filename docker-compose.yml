services:
  app:
    build: .
    container_name: tommysinny-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
    volumes:
      # Persist SQLite DB and uploaded images
      - ./data:/app/data
    expose:
      - "4000"
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: tommysinny-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      DOMAIN: ${DOMAIN:-sinnybytommy.ru}
      ACME_EMAIL: ${ACME_EMAIL:-admin@sinnybytommy.ru}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - web

networks:
  web:
    driver: bridge

volumes:
  caddy_data:    # сертификаты Let's Encrypt
  caddy_config:  # внутренний state Caddy
